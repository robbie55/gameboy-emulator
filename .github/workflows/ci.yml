name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.preset }})
    strategy:
      fail-fast: false # easier debugging across builds
      matrix:
        os: [ubuntu-24.04, macos-14]
        preset: [debug, release]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }}

      - name: Test
        # --no-tests=ignore keeps CI green until you add tests.
        # Switch to --no-tests=error once you have a test suite.
        run: ctest --preset ${{ matrix.preset }} --no-tests=ignore

  lint:
    name: Linter (clang-format)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Clang Format
        # Requires a .clang-format file at the repo root to define your style.
        run: git ls-files -z '*.cpp' '*.hpp' '*.h' | xargs -0 clang-format --dry-run --Werror
